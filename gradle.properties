# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
org.gradle.parallel=true
kotlin.code.style=official
android.nonTransitiveRClass=true
org.gradle.caching=true
org.gradle.configuration-cache=false
org.gradle.workers.max=4
kotlin.compiler.execution.strategy=in-process

# Force Gradle to use the bundled Android Studio JBR (which is a full JDK)
# instead of auto-detecting the broken JRE from VS Code extensions.
org.gradle.java.home=C\:/Program Files/Android/Android Studio/jbr
org.gradle.java.installations.paths=C\:/Program Files/Android/Android Studio/jbr
org.gradle.java.installations.auto-detect=false
org.gradle.java.installations.auto-download=false
